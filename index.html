<!DOCTYPE html>
<head>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Open+Sans:ital,wght@0,300..800;1,300..800&display=swap');

    * {
      margin:0;
      padding:0;
    }

    .canvas {
      background: url("./dustbackground.png");
      min-height:800px;
      height:100vh;
      background-size:cover;
      background-position:center;
      background-color:black;
    }

    .navbarcontainer{
      display:flex;
    }

    .navbar {
      display:flex;
      width: 100vw;
      justify-content:space-evenly;

      list-style-type: none;

      background-position: 100% 100%, 0 100%;
      background-repeat: no-repeat, no-repeat;
    }

    a:hover {
      color:rgb(221, 62, 62);
      background-size:
      0 2px,
      100% 2px;
    }

    .navbartitle {
      flex:1.5;
    }

    .titlecontent {
      display: flex;
      padding-top: 100px;
    }

    .title h1 {
      color: rgb(191, 19, 51);
      font-family: "Open Sans";
      font-weight: 300;
      font-size: 6vw;
    }

    .title h2 {
      font-family: "Open Sans";
      font-weight: 100;
      color: rgb(196, 105, 97);
      letter-spacing: 3px;
      font-size: 1.5vw;
    }

    .titlespacerleft {
      min-width: 80px;
      flex: 4;
    }

    .titlespacerright {
      width: 80px;
    }

    @media (min-width:320px) {
    }

    @media (min-width:480px) {
    }

    @media (min-width:600px) {
    }

    @media (min-width:950px) {
    }

</head>
<body>

  <div class="canvas">
    <div class="navbarcontainer">
      <ul class="navbar">
        <li>
          <a href="about.html">About</a>

        <li>
          <a href="toolbox.html">Toolbox</a>
        </li>
      </ul>
      <div class="navbartitle">
        
      </div>
    </div>
    <div class="titlecontent">

      <div class="title">
        <h1>

        <br>
